name: Build and deploy Verso site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          use-mathlib-cache: true

      - name: Restore Verso literate cache
        id: restore-verso-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .lake/build/literate
            .lake/build/literate-html
          key: verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-

      - name: Build Verso literate HTML
        id: build-site
        run: echo "path=$(lake query :literateHtml)" >> "$GITHUB_OUTPUT"

      - name: Save Verso literate cache
        if: steps.restore-verso-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .lake/build/literate
            .lake/build/literate-html
          key: verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}

      - name: Assemble _site
        run: |
          VERSO_OUT="${{ steps.build-site.outputs.path }}"
          echo "Verso output: $VERSO_OUT"
          mkdir -p _site
          cp -r "$VERSO_OUT"/* _site/
          cp docs/literate/clrs-literate.css _site/clrs-literate.css

      - name: Optimize generated HTML
        run: python3 scripts/optimize_literate_html.py _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
